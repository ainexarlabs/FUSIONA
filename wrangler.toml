name = "fusiona-real-estate"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# Secrets (set with `wrangler pages secret put <NAME>` or in the Cloudflare
# Pages dashboard under Settings > Environment variables). Never commit real
# values — this file only documents which ones the Pages Functions expect.
#
#   SUPABASE_URL                       - same as VITE_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY          - Supabase service_role key (server-only)
#   RESEND_API_KEY                     - Resend API key for visit notification emails
#   NOTIFY_EMAIL_TO                    - inbox that receives visit request notifications
#   NOTIFY_EMAIL_FROM                  - verified "from" address in Resend
#   GOOGLE_SERVICE_ACCOUNT_EMAIL        - service account email with calendar access
#   GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY  - service account private key (PEM, \n-escaped)
#   GOOGLE_CALENDAR_ID                  - calendar ID to check/book visits against
